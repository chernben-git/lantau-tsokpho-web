<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>廖教授 ASR 模型測試</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#f0ebe3;padding:16px;max-width:640px;margin:0 auto;}
h2{color:#C8352A;margin-bottom:4px;font-size:20px;}
.sub{color:#888;font-size:12px;margin-bottom:16px;}
.card{background:white;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.07);}
.card h3{margin:0 0 10px;font-size:13px;color:#555;font-weight:600;}
.model-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;}
.mbtn{padding:7px 12px;border-radius:12px;border:1.5px solid #ddd;background:white;font-size:12px;color:#333;cursor:pointer;text-align:left;line-height:1.4;}
.mbtn.active{background:#C8352A;border-color:#C8352A;color:white;font-weight:700;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
button.big{padding:12px 20px;border-radius:22px;border:none;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;}
.btn-rec{background:#C8352A;color:white;}
.btn-rec.on{background:#555;}
.btn-clr{background:#eee;color:#666;font-weight:500;}
.log-box{background:#1a1a2e;border-radius:10px;padding:12px;font-size:11.5px;color:#a8d8a8;font-family:monospace;min-height:80px;max-height:200px;overflow-y:auto;margin-top:10px;white-space:pre-wrap;word-break:break-all;}
.result-card{border-left:4px solid #C8352A;padding:10px 14px;background:#fff8f5;border-radius:0 10px 10px 0;margin-bottom:8px;}
.result-label{font-size:11px;color:#888;margin-bottom:4px;font-weight:600;letter-spacing:0.05em;}
.result-val{font-size:17px;font-weight:700;color:#1a1a3a;line-height:1.5;}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:8px;font-weight:600;margin-left:8px;}
.tag-ok{background:#e8f5e9;color:#2e7d32;}
.status{font-size:12px;color:#888;margin-top:8px;min-height:18px;}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{border:none;border-top:1px solid #eee;margin:10px 0;}
.highlight{background:#e8f5e9;border-left-color:#2e7d32 !important;}
</style>
</head>
<body>

<h2>🔬 廖教授 ASR 模型測試</h2>
<p class="sub">測試各模型輸出，確認台語→英文路線是否可行</p>

<div class="card">
  <h3>選擇 ASR 模型</h3>
  <div class="model-grid">
    <button class="mbtn active" data-model="taigi-0515" onclick="selModel(this)">
      🌟 taigi-0515<br><span style="font-size:10px;opacity:0.8">國台英通用 (預設)</span>
    </button>
    <button class="mbtn" data-model="taigi-bun-0814" onclick="selModel(this)">
      taigi-bun-0814<br><span style="font-size:10px;opacity:0.8">台語漢字輸出</span>
    </button>
    <button class="mbtn" data-model="taigi-roma-0814" onclick="selModel(this)">
      taigi-roma-0814<br><span style="font-size:10px;opacity:0.8">台羅拼音輸出</span>
    </button>
    <button class="mbtn" data-model="hakka-normal-0909" onclick="selModel(this)">
      hakka-normal-0909<br><span style="font-size:10px;opacity:0.8">國英台客通用</span>
    </button>
  </div>
  <div style="font-size:11px;color:#aaa;">目前：<b id="curModelLabel">taigi-0515（國台英通用）</b></div>
</div>

<div class="card">
  <h3>🎙️ 錄音（說台語或英語試試）</h3>
  <div class="btn-row">
    <button class="big btn-rec" id="recBtn" onclick="toggleRec()">🎙️ 開始錄音</button>
    <button class="big btn-clr" onclick="clearAll()">清除</button>
  </div>
  <div class="status" id="recStatus">選好模型後按錄音</div>
</div>

<div class="card" id="resultCard" style="display:none">
  <h3>📊 辨識結果 <span id="asrTimeBadge" style="font-size:11px;color:#888;font-weight:400;"></span></h3>
  <div id="resultArea"></div>
</div>

<div class="card">
  <h3>📋 Log</h3>
  <div class="log-box" id="logBox">等待操作…</div>
</div>

<script>
const API = 'https://asr.bitfull.tw';
let curModel = 'taigi-0515';
let recording = false;
let mediaRecObj = null;
let recChunks = [];

const modelLabels = {
  'taigi-0515': 'taigi-0515（國台英通用）',
  'taigi-bun-0814': 'taigi-bun-0814（台語漢字）',
  'taigi-roma-0814': 'taigi-roma-0814（台羅拼音）',
  'hakka-normal-0909': 'hakka-normal-0909（國英台客通用）'
};

function selModel(btn){
  document.querySelectorAll('.mbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  curModel = btn.dataset.model;
  document.getElementById('curModelLabel').textContent = modelLabels[curModel]||curModel;
  log('切換模型：' + curModel);
}

function log(msg){
  const box = document.getElementById('logBox');
  const ts = new Date().toLocaleTimeString('zh-TW');
  box.textContent += `\n[${ts}] ${msg}`;
  box.scrollTop = box.scrollHeight;
}

function clearAll(){
  document.getElementById('resultCard').style.display='none';
  document.getElementById('resultArea').innerHTML='';
  document.getElementById('logBox').textContent='已清除';
  document.getElementById('recStatus').textContent='選好模型後按錄音';
}

async function toggleRec(){
  const btn = document.getElementById('recBtn');
  if(recording){
    recording = false;
    if(mediaRecObj && mediaRecObj.state !== 'inactive') mediaRecObj.stop();
    return;
  }
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    recording = true;
    btn.innerHTML = `<div class="spin"></div> 停止`;
    btn.classList.add('on');
    document.getElementById('recStatus').textContent = '錄音中… 說完按停止';
    log('開始錄音 | 模型=' + curModel);
    recChunks = [];
    mediaRecObj = new MediaRecorder(stream);
    mediaRecObj.ondataavailable = e => { if(e.data.size>0) recChunks.push(e.data); };
    mediaRecObj.onstop = async () => {
      stream.getTracks().forEach(t=>t.stop());
      btn.textContent = '🎙️ 開始錄音';
      btn.classList.remove('on');
      recording = false;
      document.getElementById('recStatus').textContent = '辨識中…';
      await sendASR();
    };
    mediaRecObj.start();
    setTimeout(()=>{ if(recording && mediaRecObj.state!=='inactive') mediaRecObj.stop(); }, 30000);
  }catch(e){
    alert('麥克風錯誤：' + e.message);
    log('錯誤：' + e.message);
  }
}

async function sendASR(){
  const t0 = Date.now();
  try{
    const blob = new Blob(recChunks, {type:'audio/webm'});
    const b64 = await new Promise((res,rej)=>{
      const fr = new FileReader();
      fr.onload = ()=>res(fr.result.split(',')[1]);
      fr.onerror = rej;
      fr.readAsDataURL(blob);
    });
    log(`送出 /asr-web | model=${curModel} | 大小=${Math.round(blob.size/1024)}KB`);

    const r = await fetch(API+'/asr-web', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({audioBase64:b64, mimeType:'audio/webm', model:curModel})
    });
    const d = await r.json();
    const ms = Date.now()-t0;
    log(`回傳(${ms}ms)：${JSON.stringify(d)}`);

    document.getElementById('asrTimeBadge').textContent = `耗時 ${(ms/1000).toFixed(2)}秒 | ${curModel}`;
    document.getElementById('resultCard').style.display = 'block';

    const area = document.getElementById('resultArea');
    area.innerHTML = '';

    // 顯示所有有值的欄位
    const fields = [
      {key:'transcript', label:'transcript（主輸出）'},
      {key:'tailo',      label:'tailo（台羅）'},
      {key:'chText',     label:'chText（華語）'},
      {key:'final_G2P',  label:'final_G2P'},
    ];

    let hasAny = false;
    fields.forEach(f=>{
      const val = d[f.key];
      if(!val) return;
      hasAny = true;
      const isEn = /^[a-zA-Z][a-zA-Z\s.,!?'"-]{2,}$/.test(val.trim());
      const div = document.createElement('div');
      div.className = 'result-card' + (isEn?' highlight':'');
      div.innerHTML = `
        <div class="result-label">${f.label}${isEn?'<span class="tag tag-ok">🎉 英文！</span>':''}</div>
        <div class="result-val">${val}</div>
      `;
      area.appendChild(div);
    });

    if(!hasAny){
      area.innerHTML = `<div class="result-card"><div class="result-label">原始回傳</div><div class="result-val" style="font-size:13px;word-break:break-all">${JSON.stringify(d)}</div></div>`;
    }

    // 狀態訊息
    const mainOut = d.transcript||'';
    const isEn = /^[a-zA-Z][a-zA-Z\s.,!?'"-]{2,}$/.test(mainOut.trim());
    if(isEn){
      document.getElementById('recStatus').textContent = `🎉 英文輸出確認！台語→英文路線可行！(${(ms/1000).toFixed(1)}秒)`;
    } else if(d.error){
      document.getElementById('recStatus').textContent = '⚠️ 錯誤：' + d.error;
    } else {
      document.getElementById('recStatus').textContent = `✅ 完成 (${(ms/1000).toFixed(1)}秒)`;
    }

  }catch(e){
    log('錯誤：' + e.message);
    document.getElementById('recStatus').textContent = '❌ ' + e.message;
  }
}
</script>
</body>
</html>
