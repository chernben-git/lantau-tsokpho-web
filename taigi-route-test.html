<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台語翻譯路線測試</title>
<style>
body{font-family:'Noto Sans TC',sans-serif;background:#f5f5f5;padding:20px;max-width:600px;margin:0 auto;}
h2{color:#C8352A;margin-bottom:4px;}
.sub{color:#888;font-size:13px;margin-bottom:20px;}
.card{background:white;border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.card h3{margin:0 0 10px;font-size:14px;color:#444;}
textarea{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:10px;font-size:16px;resize:none;outline:none;box-sizing:border-box;}
textarea:focus{border-color:#C8352A;}
.btn-row{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
button{padding:10px 18px;border-radius:20px;border:none;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;}
.btn-mic{background:#C8352A;color:white;}
.btn-mic.on{background:#888;}
.btn-run{background:#1a1a3a;color:white;}
.btn-clr{background:#eee;color:#666;}
.result-box{margin-top:12px;background:#f9f9f9;border-radius:10px;padding:14px;min-height:60px;}
.result-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;}
.result-col{flex:1;}
.result-label{font-size:11px;color:#888;margin-bottom:4px;font-weight:600;letter-spacing:0.05em;}
.result-txt{font-size:18px;font-weight:700;color:#1a1a3a;line-height:1.5;}
.time-tag{font-size:12px;padding:3px 10px;border-radius:10px;background:#e8f5e9;color:#2e7d32;font-weight:600;white-space:nowrap;}
.time-tag.slow{background:#fff3e0;color:#e65100;}
.status{font-size:12px;color:#888;margin-top:8px;}
.divider{border:none;border-top:1px solid #eee;margin:14px 0;}
.winner{font-size:13px;font-weight:700;padding:8px 14px;border-radius:8px;background:#e8f5e9;color:#2e7d32;text-align:center;}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.asr-result{font-size:13px;color:#666;background:#fff8f0;border-radius:8px;padding:8px 12px;margin-bottom:10px;}
</style>
</head>
<body>

<h2>🧪 台語翻譯路線速度測試</h2>
<p class="sub">比較「台羅→英文→目標語言」vs「華語→目標語言」的速度與品質</p>

<div class="card">
  <h3>🎙️ 步驟一：說台語（廖教授ASR辨識）</h3>
  <div id="asrResult" class="asr-result" style="display:none"></div>
  <div class="btn-row">
    <button class="btn-mic" id="micBtn" onclick="toggleMic()">🎙️ 按住說台語</button>
    <button class="btn-clr" onclick="clearAll()">清除</button>
  </div>
  <div id="micStatus" class="status">等待錄音…</div>
</div>

<div class="card">
  <h3>📝 或直接打字測試</h3>
  <textarea id="taInput" rows="3" placeholder="輸入台語漢字，例如：咱今仔日去台南好無"></textarea>
  <div class="btn-row">
    <button class="btn-run" onclick="runBoth()">
      <span id="runSpinner" style="display:none" class="spin"></span>
      🚀 同時跑兩條路線
    </button>
  </div>
</div>

<div class="card">
  <h3>📊 目標語言</h3>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <button onclick="setTarget(this,'zh-TW','華語')" class="tgt active" style="background:#C8352A;color:white;padding:6px 14px;border-radius:16px;border:none;font-size:13px;cursor:pointer;">華語</button>
    <button onclick="setTarget(this,'ja','日語')" class="tgt" style="background:#eee;color:#333;padding:6px 14px;border-radius:16px;border:none;font-size:13px;cursor:pointer;">日語</button>
    <button onclick="setTarget(this,'en','English')" class="tgt" style="background:#eee;color:#333;padding:6px 14px;border-radius:16px;border:none;font-size:13px;cursor:pointer;">English</button>
    <button onclick="setTarget(this,'vi','Việt')" class="tgt" style="background:#eee;color:#333;padding:6px 14px;border-radius:16px;border:none;font-size:13px;cursor:pointer;">Việt</button>
    <button onclick="setTarget(this,'th','ไทย')" class="tgt" style="background:#eee;color:#333;padding:6px 14px;border-radius:16px;border:none;font-size:13px;cursor:pointer;">ไทย</button>
  </div>
</div>

<div class="card" id="resultCard" style="display:none">
  <h3>📈 比較結果</h3>
  <div class="result-box">
    <div class="result-row">
      <div class="result-col">
        <div class="result-label">🔴 路線A：台語→英文→<span id="targetNameA">目標</span></div>
        <div class="result-txt" id="resultA">—</div>
      </div>
      <div id="timeTagA" class="time-tag" style="display:none"></div>
    </div>
    <hr class="divider">
    <div class="result-row">
      <div class="result-col">
        <div class="result-label">🔵 路線B：台語→華語→<span id="targetNameB">目標</span></div>
        <div class="result-txt" id="resultB">—</div>
      </div>
      <div id="timeTagB" class="time-tag" style="display:none"></div>
    </div>
    <hr class="divider">
    <div id="verdict" style="display:none"></div>
    <div id="runStatus" class="status"></div>
  </div>
</div>

<script>
const API='https://asr.bitfull.tw';
let targetLang='zh-TW', targetName='華語';
let isRec=false, rec=null, asrData=null;

function setTarget(btn,code,name){
  targetLang=code; targetName=name;
  document.querySelectorAll('.tgt').forEach(b=>{b.style.background='#eee';b.style.color='#333';});
  btn.style.background='#C8352A'; btn.style.color='white';
}

function clearAll(){
  document.getElementById('taInput').value='';
  document.getElementById('asrResult').style.display='none';
  document.getElementById('resultCard').style.display='none';
  asrData=null;
}

// ── ASR 錄音 ──
let recChunks=[], mediaRecObj=null, recording=false;
async function toggleMic(){
  const btn=document.getElementById('micBtn');
  if(recording){
    recording=false;
    if(mediaRecObj&&mediaRecObj.state!=='inactive') mediaRecObj.stop();
    return;
  }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    recording=true;
    btn.textContent='⏹ 停止錄音'; btn.style.background='#888';
    recChunks=[];
    mediaRecObj=new MediaRecorder(stream);
    mediaRecObj.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data);};
    mediaRecObj.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      btn.textContent='🎙️ 按住說台語'; btn.style.background='#C8352A';
      recording=false;
      document.getElementById('micStatus').textContent='辨識中…';
      try{
        const blob=new Blob(recChunks,{type:'audio/webm'});
        const b64=await new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(fr.result.split(',')[1]);fr.onerror=rej;fr.readAsDataURL(blob);});
        const r=await fetch(API+'/asr-web',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({audioBase64:b64,mimeType:'audio/webm'})});
        const d=await r.json();
        if(d.success){
          asrData=d;
          const box=document.getElementById('asrResult');
          box.style.display='block';
          box.innerHTML=`<b>台語漢字：</b>${d.transcript||'—'}<br><b>台羅：</b>${d.tailo||'—'}<br><b>華語(chText)：</b>${d.chText||'—'}`;
          document.getElementById('taInput').value=d.transcript||d.chText||'';
          document.getElementById('micStatus').textContent='✅ 辨識完成，可以按「同時跑兩條路線」';
        }else{
          document.getElementById('micStatus').textContent='⚠️ 辨識失敗：'+d.error;
        }
      }catch(e){document.getElementById('micStatus').textContent='錯誤：'+e.message;}
    };
    mediaRecObj.start();
    setTimeout(()=>{if(recording&&mediaRecObj.state!=='inactive')mediaRecObj.stop();},30000);
  }catch(e){alert('麥克風錯誤：'+e.message);}
}

// ── 兩條路線同時跑 ──
async function runBoth(){
  const inputText=document.getElementById('taInput').value.trim();
  if(!inputText){alert('請先輸入台語文字或錄音');return;}

  document.getElementById('resultCard').style.display='block';
  document.getElementById('resultA').textContent='翻譯中…';
  document.getElementById('resultB').textContent='翻譯中…';
  document.getElementById('verdict').style.display='none';
  document.getElementById('timeTagA').style.display='none';
  document.getElementById('timeTagB').style.display='none';
  document.getElementById('targetNameA').textContent=targetName;
  document.getElementById('targetNameB').textContent=targetName;

  const spinner=document.getElementById('runSpinner');
  spinner.style.display='inline-block';

  // 路線A：台語漢字 → /from-taigi?targetLang=en → 英文 → 若目標不是英文再轉一次
  const runA=async()=>{
    const t0=Date.now();
    const r=await fetch(API+'/translate/from-taigi',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text:inputText,targetLang:'en'})
    });
    const d=await r.json();
    const enText=d.translated||d.chText||'';
    let finalText=enText;
    if(targetLang!=='en'&&enText){
      const r2=await fetch(API+'/translate/mandarin-to-world',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({text:enText,targetLang})
      });
      const d2=await r2.json();
      finalText=d2.translated||enText;
    }
    return {text:finalText,ms:Date.now()-t0};
  };

  // 路線B：chText（華語）→ /mandarin-to-world → 目標語言
  const runB=async()=>{
    const t0=Date.now();
    const chText=asrData?.chText||inputText;
    if(targetLang==='zh-TW') return {text:chText,ms:Date.now()-t0};
    const r=await fetch(API+'/translate/mandarin-to-world',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text:chText,targetLang})
    });
    const d=await r.json();
    return {text:d.translated||chText,ms:Date.now()-t0};
  };

  const [a,b]=await Promise.allSettled([runA(),runB()]);

  spinner.style.display='none';

  const resA=a.status==='fulfilled'?a.value:{text:'失敗：'+a.reason,ms:0};
  const resB=b.status==='fulfilled'?b.value:{text:'失敗：'+b.reason,ms:0};

  document.getElementById('resultA').textContent=resA.text;
  document.getElementById('resultB').textContent=resB.text;

  const tagA=document.getElementById('timeTagA');
  tagA.textContent=(resA.ms/1000).toFixed(1)+'秒';
  tagA.className='time-tag'+(resA.ms>8000?' slow':'');
  tagA.style.display='block';

  const tagB=document.getElementById('timeTagB');
  tagB.textContent=(resB.ms/1000).toFixed(1)+'秒';
  tagB.className='time-tag'+(resB.ms>8000?' slow':'');
  tagB.style.display='block';

  // 判定
  const verdict=document.getElementById('verdict');
  verdict.style.display='block';
  const diff=resB.ms-resA.ms;
  if(Math.abs(diff)<500){
    verdict.innerHTML='<div class="winner" style="background:#e3f2fd;color:#1565c0;">⚖️ 兩條路線速度相近</div>';
  }else if(diff>0){
    verdict.innerHTML=`<div class="winner">🏆 路線A（英文橋接）快 ${(diff/1000).toFixed(1)} 秒</div>`;
  }else{
    verdict.innerHTML=`<div class="winner" style="background:#e8f5e9;color:#2e7d32;">🏆 路線B（華語橋接）快 ${(Math.abs(diff)/1000).toFixed(1)} 秒</div>`;
  }

  document.getElementById('runStatus').textContent=`A: ${(resA.ms/1000).toFixed(1)}秒 | B: ${(resB.ms/1000).toFixed(1)}秒`;
}
</script>
</body>
</html>
