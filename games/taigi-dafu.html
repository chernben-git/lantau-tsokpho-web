<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>咱兜的台灣大富翁 · 高速公路版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@700;900&family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:      #06101c;
  --text:    #eef7ff;
  --muted:   #7a9ab8;
  --border:  rgba(89,216,255,.14);
  --red:     #ff3355;
  --blue:    #1a7fff;
  --cyan:    #00e5ff;
  --green:   #00cc88;
  --gold:    #f0c040;
  --purple:  #b87dff;
  --west:    #34d17b;
  --east:    #46a8ff;
  --south:   #ff9b43;
  --chance:  #ffd34d;
  --fate:    #b87dff;
  --hud:     'Orbitron', sans-serif;
  --mono:    'Share Tech Mono', monospace;
  --body:    'Noto Sans TC', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;overflow:hidden;
  font-family:var(--body);color:var(--text);
  background:radial-gradient(1200px 800px at 50% 10%,#13325d 0%,#081424 32%,#050b14 78%,#02060b 100%);
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(circle at 15% 18%,rgba(89,216,255,.08),transparent 18%),
    radial-gradient(circle at 82% 12%,rgba(255,211,77,.06),transparent 16%),
    radial-gradient(circle at 80% 75%,rgba(184,125,255,.08),transparent 14%);
  filter:blur(12px);
}
body::after{
  content:"";position:fixed;inset:0;pointer-events:none;opacity:.22;
  background-image:linear-gradient(rgba(120,180,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(120,180,255,.08) 1px,transparent 1px);
  background-size:28px 28px;
  mask-image:radial-gradient(circle at center,#000 42%,transparent 92%);
}

/* ── STARS ── */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) var(--dl,0s) ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:.08}100%{opacity:.5}}
#scan{position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,.06) 3px,transparent 4px)}
#vig{position:fixed;inset:0;pointer-events:none;z-index:1;background:radial-gradient(circle at center,transparent 38%,rgba(0,0,0,.6) 100%)}

/* ── CORNERS ── */
.corner{position:fixed;width:24px;height:24px;z-index:50}
#ctlc{top:12px;left:12px;border-top:2px solid var(--border);border-left:2px solid var(--border);border-top-left-radius:6px}
#ctrc{top:12px;right:12px;border-top:2px solid var(--border);border-right:2px solid var(--border);border-top-right-radius:6px}
#cblc{bottom:12px;left:12px;border-bottom:2px solid var(--border);border-left:2px solid var(--border);border-bottom-left-radius:6px}
#cbrc{bottom:12px;right:12px;border-bottom:2px solid var(--border);border-right:2px solid var(--border);border-bottom-right-radius:6px}

/* ── TOP HUD ── */
#topBar{
  position:fixed;top:0;left:0;right:0;height:64px;z-index:40;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  background:linear-gradient(180deg,rgba(6,16,28,.95),rgba(6,16,28,.82));
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(16px);
}
.phud{display:flex;align-items:center;gap:10px;min-width:190px}
.phud-r{flex-direction:row-reverse}
.live-dot{width:7px;height:7px;border-radius:50%;animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.phud-avatar{font-size:26px;line-height:1}
.phud-name{font-family:var(--hud);font-size:9px;letter-spacing:.15em;margin-bottom:2px}
.phud-cash{font-family:var(--mono);font-size:16px;color:var(--green);letter-spacing:.04em}
.phud-loc{font-size:9px;color:var(--muted);margin-top:2px;white-space:nowrap}
#hudCenter{text-align:center;flex:1}
.logo-main{font-family:var(--hud);font-size:15px;font-weight:900;letter-spacing:.18em;
  background:linear-gradient(90deg,var(--cyan),var(--gold),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:.18em;margin-top:2px}
.turn-badge{display:inline-flex;align-items:center;gap:6px;margin-top:5px;
  padding:3px 10px;border-radius:99px;background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.18)}
.turn-dot{width:5px;height:5px;border-radius:50%;background:var(--cyan);animation:blink 1s infinite}
#turnTxt{font-family:var(--hud);font-size:8px;letter-spacing:.12em;color:var(--cyan)}

/* ── LAYOUT ── */
#main{
  position:fixed;top:64px;left:0;right:0;bottom:0;
  display:grid;
  grid-template-columns: 1fr 280px;
  grid-template-rows: 1fr;
  z-index:10;
  overflow:hidden;
}

/* ── 地圖欄 ── */
#mapWrap{
  position:relative;
  width:100%;height:100%;
  overflow:hidden;
}
#mapWrap svg{
  width:100%;height:100%;
  display:block;
}

/* ── 右欄：骰子 + 記錄 ── */
#rightPanel{
  display:flex;flex-direction:column;
  padding:12px 14px 8px;
  gap:10px;overflow:hidden;
  border-left:1px solid var(--border);
  background:rgba(4,10,20,.6);
}

/* ── 路線說明（浮在地圖左上角）── */
#legendFloat{
  position:absolute;top:10px;left:10px;z-index:20;
}
#legendBtn{
  font-family:var(--hud);font-size:8px;letter-spacing:.1em;
  padding:5px 11px;border-radius:8px;cursor:pointer;
  background:rgba(8,18,36,.88);color:var(--muted);
  border:1px solid var(--border);backdrop-filter:blur(8px);
  display:flex;align-items:center;gap:6px;
}
#legendBtn .leg-arrow{transition:transform .3s;font-size:9px;}
#legendDrop{
  display:none;margin-top:6px;
  background:rgba(6,14,28,.94);border:1px solid var(--border);
  border-radius:12px;padding:10px 14px;min-width:200px;
  box-shadow:0 12px 36px rgba(0,0,0,.5);backdrop-filter:blur(12px);
}
#legendDrop.open{display:block;}

/* ── DICE ── */
#diceRow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.die{
  width:44px;height:44px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;
  background:linear-gradient(145deg,rgba(20,40,70,.9),rgba(10,22,42,.9));
  border:1px solid rgba(89,216,255,.25);
  box-shadow:0 4px 14px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06);
  user-select:none;
}
.die.roll{animation:diceRoll .45s ease-in-out}
@keyframes diceRoll{0%,100%{transform:rotate(0)}25%{transform:rotate(-15deg) scale(1.12)}75%{transform:rotate(12deg) scale(1.08)}}
#rollBtn{
  font-family:var(--hud);font-size:11px;font-weight:700;letter-spacing:.22em;
  padding:11px 22px;border-radius:10px;cursor:pointer;
  background:linear-gradient(135deg,rgba(0,229,255,.18),rgba(0,150,255,.22));
  color:var(--cyan);border:1px solid rgba(0,229,255,.35);
  box-shadow:0 0 18px rgba(0,229,255,.15),inset 0 1px 0 rgba(255,255,255,.06);
  transition:all .2s;
}
#rollBtn:hover:not(:disabled){background:linear-gradient(135deg,rgba(0,229,255,.28),rgba(0,150,255,.32));box-shadow:0 0 28px rgba(0,229,255,.3)}
#rollBtn:disabled{opacity:.35;cursor:not-allowed}
#diceSum{font-family:var(--mono);font-size:11px;color:var(--muted)}

/* ── LOG ── */
#logWrap{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;
  background:rgba(8,18,34,.7);border:1px solid var(--border);border-radius:14px;
  transition:flex .3s ease;}
#logWrap.collapsed{flex:0 0 36px;}
#logTitle{
  font-family:var(--hud);font-size:8px;letter-spacing:.15em;color:var(--muted);
  padding:10px 12px 6px;
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;user-select:none;flex-shrink:0;
  border-radius:14px;
  transition:background .2s;
}
#logTitle:hover{background:rgba(89,216,255,.06);}
#logTitle .log-arrow{font-size:10px;color:var(--muted);transition:transform .3s;}
#logWrap.collapsed #logTitle .log-arrow{transform:rotate(-90deg);}
#logBody{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;padding:0 10px 8px;
  transition:opacity .25s;}
#logWrap.collapsed #logBody{opacity:0;pointer-events:none;}
#logList{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
#logList::-webkit-scrollbar{width:3px}
#logList::-webkit-scrollbar-thumb{background:rgba(89,216,255,.2);border-radius:99px}
.lm{font-size:11px;color:var(--muted);padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.lmn{font-size:11px;color:var(--green);padding:3px 0;border-bottom:1px solid rgba(0,200,136,.08)}
.lt{font-size:11px;color:var(--red);padding:3px 0;border-bottom:1px solid rgba(255,50,80,.08)}
.lc{font-size:11px;color:var(--gold);padding:3px 0;border-bottom:1px solid rgba(240,192,64,.08)}
.lp{font-size:11px;color:var(--purple);padding:3px 0;border-bottom:1px solid rgba(184,125,255,.08)}

/* ── LEGEND ── */
#legendBtn{
  font-family:var(--hud);font-size:8px;letter-spacing:.12em;
  padding:5px 11px;border-radius:8px;cursor:pointer;
  background:rgba(14,26,48,.85);color:var(--muted);
  border:1px solid var(--border);backdrop-filter:blur(8px);
}
#legendDrop{
  display:none;margin-top:6px;
  background:rgba(8,18,34,.92);border:1px solid var(--border);
  border-radius:12px;padding:10px 14px;
  box-shadow:0 12px 36px rgba(0,0,0,.4);
}
#legendDrop.open{display:block}
.leg-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:11px;color:#c8dff4}
.leg-ln{width:22px;height:4px;border-radius:99px;flex-shrink:0}
.leg-sp{display:flex;gap:14px;padding:4px 0;font-size:11px}
.leg-hr{border:none;border-top:1px solid var(--border);margin:4px 0}

/* ── CITY POPUP ── */
#cpop{
  position:fixed;z-index:60;width:180px;
  background:rgba(6,16,28,.92);border:1px solid var(--border);
  border-radius:14px;padding:12px;display:none;
  box-shadow:0 14px 40px rgba(0,0,0,.5);backdrop-filter:blur(14px);
}
.cp-t{font-family:var(--hud);font-size:12px;letter-spacing:.1em;margin-bottom:4px}
.cp-h{font-size:10px;color:var(--muted);margin-bottom:8px}
.cp-g{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.cp-l{font-size:8px;letter-spacing:.1em;color:var(--muted);font-family:var(--hud)}
.cp-v{font-family:var(--mono);font-size:12px}

/* ── MODALS ── */
.mbg{
  position:fixed;inset:0;z-index:80;
  display:flex;align-items:center;justify-content:center;
  background:rgba(2,6,12,.75);backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;transition:opacity .28s;
}
.mbg.show{opacity:1;pointer-events:all}
.mbox{
  background:linear-gradient(145deg,rgba(10,22,40,.97),rgba(6,14,28,.97));
  border:1px solid var(--border);border-radius:20px;
  padding:24px 22px;min-width:280px;max-width:340px;width:90vw;
  box-shadow:0 24px 64px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.06);
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.mbox.opportunity{border-color:rgba(255,211,77,.4);box-shadow:0 0 40px rgba(255,211,77,.12),0 24px 64px rgba(0,0,0,.6)}
.mbox.destiny{border-color:rgba(184,125,255,.4);box-shadow:0 0 40px rgba(184,125,255,.14),0 24px 64px rgba(0,0,0,.6)}
.mbox.buy-opt{border-color:rgba(0,204,136,.4)}
.mbox.build-opt{border-color:rgba(255,170,0,.4)}
.mc-tp{font-family:var(--hud);font-size:10px;letter-spacing:.2em}
.mc-ic{font-size:46px;line-height:1.2}
.mc-ti{font-size:16px;font-weight:900;font-family:'Noto Serif TC',serif;text-align:center}
.mc-ds{font-size:12px;color:var(--muted);text-align:center;line-height:1.6}
.mc-ef{font-family:var(--mono);font-size:16px;font-weight:700}
.cbtn,.mbtn{
  margin-top:4px;padding:9px 22px;border-radius:10px;cursor:pointer;
  background:linear-gradient(135deg,rgba(0,229,255,.14),rgba(0,150,255,.18));
  color:var(--cyan);border:1px solid rgba(0,229,255,.3);
  font-family:var(--body);font-size:13px;font-weight:700;
  transition:all .2s;
}
.cbtn:hover,.mbtn:hover{background:linear-gradient(135deg,rgba(0,229,255,.24),rgba(0,150,255,.28))}
#cardAct{display:flex;gap:8px;margin-top:6px;justify-content:center;flex-wrap:wrap}
.act-btn{padding:9px 18px;border-radius:9px;border:none;cursor:pointer;font-size:13px;font-family:var(--body);font-weight:700;transition:all .2s}
.act-btn.buy{background:linear-gradient(135deg,#00cc88,#00aa66);color:#fff;box-shadow:0 0 14px rgba(0,204,136,.35)}
.act-btn.buy:hover{transform:scale(1.04);box-shadow:0 0 22px rgba(0,204,136,.55)}
.act-btn.pass{background:rgba(100,120,150,.25);color:#99bbcc;border:1px solid rgba(100,150,200,.2)}
.act-btn.pass:hover{background:rgba(100,120,150,.4)}

/* ── PROVERB MODAL ── */
.mp-reg{font-family:var(--hud);font-size:9px;letter-spacing:.15em;color:var(--muted)}
.mp-icon{font-size:40px;line-height:1.3}
.mp-tw{font-size:20px;font-weight:900;font-family:'Noto Serif TC',serif;color:var(--gold);text-align:center;letter-spacing:.06em}
.mp-zh{font-size:12px;color:var(--muted);text-align:center;line-height:1.6}
.mp-mn{font-size:11px;color:rgba(120,180,220,.7);text-align:center;line-height:1.5;font-style:italic}
.prov-btns{display:flex;gap:8px;margin-top:4px}

/* ══ 圖卡設計 ══ */
.card-scene{
  width:300px;max-width:90vw;
  border-radius:20px;overflow:hidden;
  animation:cardIn .35s ease;
}
@keyframes cardIn{
  from{transform:scale(.8) translateY(20px);opacity:0;}
  to{transform:scale(1) translateY(0);opacity:1;}
}
.card-front-inner{
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 18px;width:100%;
  border-radius:20px;overflow:hidden;
}
/* 命運卡：紫色 */
.card-front-inner.destiny{
  background:linear-gradient(160deg,#2a0d5e 0%,#1a0a3a 40%,#0d0820 100%);
  border:2px solid rgba(180,100,255,.5);
  box-shadow:0 0 50px rgba(150,80,255,.2),0 20px 60px rgba(0,0,0,.7);
}
/* 機會卡：金色 */
.card-front-inner.opportunity{
  background:linear-gradient(160deg,#3d2a00 0%,#1e1400 40%,#0a0800 100%);
  border:2px solid rgba(255,200,60,.45);
  box-shadow:0 0 50px rgba(255,180,40,.18),0 20px 60px rgba(0,0,0,.7);
}
.cf-header{
  width:100%;padding:14px 18px 10px;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;
}
.destiny   .cf-header{background:linear-gradient(90deg,rgba(150,80,255,.25),transparent);}
.opportunity .cf-header{background:linear-gradient(90deg,rgba(255,180,40,.2),transparent);}
.cf-tag{
  font-family:var(--hud);font-size:9px;letter-spacing:.2em;font-weight:700;
  padding:3px 10px;border-radius:99px;
}
.destiny   .cf-tag{color:#e8b4ff;background:rgba(180,100,255,.2);border:1px solid rgba(180,100,255,.35);}
.opportunity .cf-tag{color:#ffe97a;background:rgba(255,200,60,.15);border:1px solid rgba(255,200,60,.3);}
.cf-corner-deco{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:14px;
}
.destiny   .cf-corner-deco::after{content:"✦";color:rgba(200,140,255,.5);}
.opportunity .cf-corner-deco::after{content:"✦";color:rgba(255,210,80,.5);}
.cf-icon{font-size:52px;line-height:1;margin:6px 0 10px;filter:drop-shadow(0 0 12px rgba(255,255,255,.3));}
.cf-title{
  font-size:18px;font-weight:900;font-family:'Noto Serif TC',serif;
  text-align:center;padding:0 16px;line-height:1.3;
}
.destiny   .cf-title{color:#f0d8ff;text-shadow:0 0 20px rgba(180,100,255,.5);}
.opportunity .cf-title{color:#fff8d0;text-shadow:0 0 20px rgba(255,200,60,.4);}
.cf-desc{
  font-size:11px;text-align:center;line-height:1.6;
  padding:8px 18px;color:rgba(200,220,255,.6);
}
.cf-effect-wrap{
  margin:8px 16px 10px;width:calc(100% - 32px);
  border-radius:12px;padding:10px 14px;text-align:center;
}
.destiny   .cf-effect-wrap{background:rgba(180,100,255,.12);border:1px solid rgba(180,100,255,.25);}
.opportunity .cf-effect-wrap{background:rgba(255,200,60,.1);border:1px solid rgba(255,200,60,.22);}
.cf-effect{
  font-family:var(--mono);font-size:18px;font-weight:700;letter-spacing:.05em;
}

/* ── V2 MAP STYLES ── */
.mapGlow{fill:none;stroke:rgba(89,216,255,.12);stroke-width:22;filter:blur(8px)}
.taiwan-shadow{fill:rgba(0,0,0,.25);transform:translate(8px,14px);filter:blur(10px)}
.taiwan-shape{fill:url(#islandGrad);stroke:url(#coastGrad);stroke-width:2.4}
.taiwan-rim{fill:none;stroke:rgba(160,230,255,.26);stroke-width:1.1}
.mountain-ridge{fill:none;stroke:rgba(255,255,255,.14);stroke-width:14;stroke-linecap:round;stroke-dasharray:1 14}
.mountain-light{fill:none;stroke:rgba(160,220,255,.12);stroke-width:26;stroke-linecap:round}
.highway{fill:none;stroke-width:4.5;stroke-linecap:round;stroke-linejoin:round;opacity:.96;filter:url(#glow)}
.h-national{stroke:var(--west);stroke-dasharray:14 10;animation:roadFlow 7s linear infinite}
.h-east{stroke:var(--east);stroke-dasharray:12 8;animation:roadFlow 8s linear infinite reverse}
.h-south{stroke:var(--south);stroke-dasharray:14 10;animation:roadFlow 6.5s linear infinite}
.road-under{fill:none;stroke:rgba(255,255,255,.07);stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
.node{cursor:pointer}
.node .pulse{fill:none;stroke:rgba(255,255,255,.18);stroke-width:1.5;animation:pulse 2.8s ease-out infinite;transform-origin:center}
.node .dot{fill:#163357;stroke:#fff;stroke-width:2;transition:transform .2s ease}
.node .core{fill:#ff5f72;opacity:.94}
.node:hover .dot{transform:scale(1.18)}
.node-special .dot{stroke-width:2.6}
.node-chance .dot{fill:#5e4800;stroke:#fff3c3}
.node-chance .core{fill:var(--chance)}
.node-fate .dot{fill:#3a1b56;stroke:#eedaff}
.node-fate .core{fill:var(--fate)}
.label{fill:#fff;font-size:13px;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.9);letter-spacing:.03em;pointer-events:none;font-family:'Noto Sans TC',sans-serif}
.label-major{fill:#fff;font-size:15px;font-weight:900;text-shadow:0 0 12px rgba(0,229,255,.4),0 2px 8px rgba(0,0,0,.9);pointer-events:none;font-family:'Noto Serif TC',serif}
.own-ring{fill:none;stroke-width:2.5;stroke-dasharray:3,2;animation:ownSpin 4s linear infinite;transform-origin:center}
@keyframes ownSpin{from{stroke-dashoffset:0}to{stroke-dashoffset:-30}}
.tok{transition:cx .3s ease,cy .3s ease;filter:drop-shadow(0 0 6px currentColor)}

@keyframes roadFlow{from{stroke-dashoffset:0}to{stroke-dashoffset:-240}}
@keyframes pulse{0%{transform:scale(.9);opacity:.65}75%{transform:scale(1.85);opacity:0}100%{transform:scale(1.85);opacity:0}}
@keyframes floatCard{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* ── COORD ── */
#coord{
  position:fixed;bottom:8px;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:9px;color:rgba(89,216,255,.25);
  letter-spacing:.18em;pointer-events:none;z-index:5;white-space:nowrap;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(89,216,255,.2);border-radius:99px}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  #main{grid-template-columns:1fr;grid-template-rows:1fr auto;}
  #mapWrap{min-height:55vh;}
  #rightPanel{
    flex-direction:row;flex-wrap:wrap;align-items:flex-start;

  s();
}

  const p=PL[pi],ci=RO[p.pi],ct=C[ci];
  addLog('📍 '+p.n+' → '+ct.ic+' '+ct.n,'lm');

// ── LAND EVENT ──
function landEv(){
  const p=PL[cur],ci=RO[p.pi],ct=C[ci];
  // Special tiles
  if(ci===0){addLog('◇ '+p.n+' 抽機會卡！','lc');setTimeout(()=>drawCard('opportunity'),400);return;}
  if(ci===10){addLog('◆ '+p.n+' 抽命運卡！','lp');setTimeout(()=>drawCard('destiny'),400);return;}
  if(ft){addLog('🎫 '+p.n+' 免費通過 '+ct.n,'lmn');ft=false;showProvThenNext(ci,p);return;}
  // Check ownership
  const ow=PROPS[ci];
  if(ow!==undefined && ow!==p.id){
    const owner=PL[ow],lvl=BUILD[ci]||0;
    const toll=Math.floor(ct.t*Math.pow(2,lvl));
    const pay=ht?Math.floor(toll/2):toll;
    p.mo=Math.max(0,p.mo-pay);
    owner.mo+=pay;
    if(ht){ht=false;addLog('💸 '+p.n+' 半價過路費 -$'+pay+' → '+owner.n,'lt');}
    else{addLog('💸 '+p.n+' 過路費 -$'+pay+(lvl>0?' (Lv'+lvl+'×'+Math.pow(2,lvl)+'倍)':'')+' → '+owner.n,'lt');}
    rHud();showProvThenNext(ci,p);return;
  }
  if(ow===p.id){
    addLog('🏠 '+p.n+' 回到自己的 '+ct.n,'lm');
    showBuildOpt(ci,p);return;
  }
  // Unowned
  if(BUYABLE.includes(ci)){
    showBuyOpt(ci,p);
  } else {
    const r=Math.random();
    if(r<0.35){const g=150+Math.floor(Math.random()*400);p.mo+=g;addLog('💰 '+p.n+' 獲得 +$'+g,'lmn');rHud();}
    else{addLog('✅ '+p.n+' 平安通過 '+ct.n,'lm');}
    showProvThenNext(ci,p);
  }
}

function markOwned(ci,pid){
  // Add SVG ownership indicator on matching node
  const gs=document.querySelectorAll('[data-ci="'+ci+'"]');
  gs.forEach(g=>{
    const ex=g.querySelector('.own-ring');if(ex)ex.remove();
    const existing=g.querySelector('circle.dot');
    if(!existing)return;
    const cx=parseFloat(existing.getAttribute('cx'));
    const cy=parseFloat(existing.getAttribute('cy'));
    const r=parseFloat(existing.getAttribute('r'));
    const ring=document.createElementNS('http://www.w3.org/2000/svg','circle');
    ring.setAttribute('class','own-ring');
    ring.setAttribute('cx',cx);ring.setAttribute('cy',cy);
    ring.setAttribute('r',r+4);
    ring.setAttribute('stroke',pid===0?'#ff3355':'#1a7fff');
    g.appendChild(ring);
  });
}

// ── 諺語 + 台語 TTS（NYCU iVoice API，與麻將版相同架構）──
const TTS_URL = 'https://familyhistroy-tree.netlify.app/.netlify/functions/tts-speak';
let _ttsPlaying = false;

// 呼叫 NYCU TTS → 自動播放台語語音
// 失敗時降級為瀏覽器 TTS（nan-TW → zh-TW）
function speakProv(txt) {
  if (!txt) return;
  // 若上一句還在播，先中斷
  _ttsPlaying = false;
  _ttsPlaying = true;

  fetch(TTS_URL, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ text: txt })
  })
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(data => {
    if (!data.audioBase64) throw new Error('no audio');
    const bytes = atob(data.audioBase64);
    const arr   = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    const blob  = new Blob([arr], { type: data.mimeType || 'audio/mp4' });
    const url   = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.onended = () => { _ttsPlaying = false; URL.revokeObjectURL(url); };
    audio.onerror = () => { _ttsPlaying = false; };
    // 自動播放
    audio.play().catch(() => { _ttsPlaying = false; });
    // 更新狀態標示
    const badge = document.getElementById('ttsLangBadge');
    if (badge) badge.textContent = '🗣 台語語音';
  })
  .catch(err => {
    console.warn('NYCU TTS 失敗，降級瀏覽器語音:', err.message);
    _ttsPlaying = false;
    const badge = document.getElementById('ttsLangBadge');
    if (badge) badge.textContent = '🗣 備用語音';
    // 降級：瀏覽器 TTS，nan-TW 優先
    if (!window.speechSynthesis) return;
    speechSynthesis.cancel();
    setTimeout(() => {
      const u = new SpeechSynthesisUtterance(txt);
      const vs = speechSynthesis.getVoices();
      const voice = vs.find(v => v.lang === 'nan-TW')
        || vs.find(v => v.lang.startsWith('nan'))
        || vs.find(v => v.lang === 'zh-TW') || null;
      if (voice) u.voice = voice;
      u.lang  = voice ? voice.lang : 'zh-TW';
      u.rate  = 0.82;
      speechSynthesis.speak(u);
    }, 100);
  });
}

// 展示可用語音（除錯按鈕）
function listVoices() {
  if (!window.speechSynthesis) { alert('此裝置不支援語音合成'); return; }
  const vs = speechSynthesis.getVoices();
  const taigi = vs.find(v => v.lang === 'nan-TW' || v.lang.startsWith('nan'));
  alert('NYCU TTS API：familyhistroy-tree.netlify.app\n\n瀏覽器備用語音：' +
    (taigi ? '✅ 找到台語 ' + taigi.lang + ' ' + taigi.name
           : '❌ 無台語，將用華語 zh-TW') +
    '\n\n完整清單（' + vs.length + '）：\n' +
    vs.slice(0,12).map(v => v.lang + ' ' + v.name).join('\n'));
}

  const ct = C[ci];
  document.getElementById('mpReg').textContent = '📍 ' + ct.n + ' · ' + ct.rg + '　台語諺語';
  document.getElementById('mpIc').textContent  = pv.ic;
  document.getElementById('mpTw').textContent  = pv.tw;
  document.getElementById('mpZh').textContent  = pv.zh;
  document.getElementById('mpMn').textContent  = '💡 ' + pv.mn;
  document.getElementById('mProv').dataset.tts = pv.tw;
  document.getElementById('mProv').classList.add('show');
  speakProv(pv.tw);   // ← 自動播放台語
  addLog('📖「' + pv.tw + '」', 'lp');
  if (pl.ai) { setTimeout(closeProverb, 6500); }  // 給台語 TTS 足夠時間播放
}

function closeProverb() {
  document.getElementById('mProv').classList.remove('show');
  _ttsPlaying = false;
  wm = false;
  nxTurn();
}


// ── TURNS ──
function nxTurn(){
  cur=(cur+1)%PL.length;
  rHud();rTok();
  PL[cur].ai?setTimeout(aiTurn,5500):(document.getElementById('rollBtn').disabled=false);
}

function aiTurn(){
  if(!PL[cur].ai)return;
  rollDice();
}

// ── INIT ──
rTok();rHud();
addLog('🛣 台灣大富翁高速公路版 開始！','lmn');
addLog('🚗 玩家一先攻，按「擲骰」開始','lm');
document.getElementById('rollBtn').disabled=false;
</script>
